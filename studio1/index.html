<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio 1: Blockbuster Video</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">

    <!-- My Styles -->
    <link href="styles.css" rel="stylesheet">

    <!-- My Script -->
    <script src="script.js" defer></script>
</head>
<body>

    <video id="myVideo" poster="images/shinton_beach_poster.jpeg" muted loop autoplay playsinline>
        <source src="media/stinson_beach_video.webm" type="video/webm">
        <source src="media/stinson_beach_video.mp4" type="video/mp4">
        
        <p>Your browser doesn't support HTML5 video. Here is a <a href="media/stinson_beach_video.mp4">link to the video</a> instead.</p>
    </video>

    <section id="controls">
            <i class="fa-solid fa-pause"></i>
            <!-- <i class="fa-solid fa-play"></i> -->

            <i class="fa-solid fa-volume-xmark"></i>
            <!-- <i class="fa-solid fa-volume-high"></i> -->

            <i class="fa-solid fa-expand"></i>
            <!-- <i class="fa-solid fa-compress"></i> -->
        </section>

    <!-- <p id="line1" class="hidden">The fog rolls over the coast...</p>
    <p id="line2" class="hidden">just as brilliantly as the waves of the sea.</p> -->

    <p id="line1" class="hidden">The fog rolls over the coast</p>
    <p id="line2" class="hidden">just as brilliantly</p>
    <p id="line3" class="hidden">as the waves of the sea.</p>


    <section id="loading">
        <img src="images/fog_icon.png" alt="fog icon" width="50" height="50">
        <p>generating fog...</p>
    </section>

    <p id="message">&#8592; Move your cursor left or right to change the video speed &#8594;</p>

    <div id="topleft" class="box"></div>
    <div id="topright" class="box"></div>
    <div id="bottomleft" class="box"></div>
    <div id="bottomright" class="box"></div>
    
    
</body>
</html>
